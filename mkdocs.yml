site_name: auditable
site_description: "An open-source system of record for AI-agent decisions: it captures what each decision relied on, replays it against live state, and rolls back the committed action when it no longer holds."
site_url: https://auditable-ai.readthedocs.io/
site_author: Yue Zhao
repo_url: https://github.com/yzhao062/auditable
repo_name: yzhao062/auditable
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  logo: assets/auditable-mark.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            heading_level: 2
            members_order: source
            docstring_section_style: list
            separate_signature: true
            filters: ["!^_", "!^fit$"]

nav:
  - Home: index.md
  - Lifecycle: lifecycle.md
  - Quickstart: quickstart.md
  - PRE: pre-rules.md
  - LIVE: realtime-replay.md
  - POST: post-analysis.md
  - Examples:
      - PRE Examples: pre-examples.md
      - LIVE Examples: realtime-examples.md
      - POST Examples: post-examples.md
  - Reference:
      - PRE Coverage: pre-coverage.md
      - Audit Report: audit-report.md
      - Architecture: architecture.md
      - API Reference: api.md
